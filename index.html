<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
<title>식당</title>
<style>
  /* 모바일 화면에서 드래그할 때 화면 전체가 꿀렁이며 스크롤되는 현상 방지 */
  html, body { 
    position: fixed; 
    overflow: hidden; 
    width: 100%; 
    height: 100%; 
    margin: 0; 
    padding: 0; 
    font-family: 'Pretendard', sans-serif; 
    background-color: #f4f6fa; 
  }
  
  .container { 
    max-width: 850px; 
    height: 100%;
    margin: 0 auto; 
    background: white; 
    padding: 20px; 
    box-sizing: border-box;
    overflow-y: auto; /* 컨테이너 내부만 스크롤 되도록 설정 */
  }
  
  .grid-layout { display: flex; gap: 15px; margin-bottom: 20px; }
  .left-col { flex: 1.2; display: flex; flex-direction: column; gap: 15px; }
  .right-col { flex: 0.8; background: #fff; border: 2px solid #e2e8f0; border-radius: 15px; padding: 12px; }
  
  .panel { background: #f8fafc; border-radius: 15px; padding: 12px; border: 1px solid #e2e8f0; }
  .panel-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: #334155; display: flex; justify-content: space-between; align-items: center; }
  
  .shop-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .shop-item { background: white; border: 1px solid #fcd34d; border-radius: 8px; padding: 6px 2px; cursor: pointer; text-align: center; user-select: none; }
  .shop-emoji { font-size: 22px; }
  .shop-price { font-size: 11px; color: #d97706; font-weight: bold; }
  
  .ingredients { display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px; background: white; padding: 10px; border-radius: 10px; border: 1px inset #f1f5f9; position: relative; }
  
  /* 중요: touch-action: none을 주어 모바일 브라우저의 기본 스크롤 메커니즘 차단 */
  .ingredient { 
    font-size: 28px; 
    cursor: grab; 
    padding: 5px; 
    background: #fff; 
    border: 2px solid #e2e8f0; 
    border-radius: 8px; 
    user-select: none; 
    touch-action: none; 
    position: relative;
    z-index: 10;
  }
  
  /* 모바일에서 드래그 중일 때 손가락 밑에 띄울 가상 스타일 */
  .ingredient.dragging {
    opacity: 0.6;
    border-color: #3b82f6;
  }

  .pot { width: 100%; height: 100px; border: 3px dashed #cbd5e1; border-radius: 15px; display: flex; align-items: center; justify-content: center; background: white; font-size: 24px; gap: 5px; transition: all 0.2s; }
  .pot.dragover { background: #eff6ff; border-color: #3b82f6; }
  
  .book-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; max-height: 350px; overflow-y: auto; }
  .book-item { background: #f1f5f9; border-radius: 10px; padding: 8px; font-size: 11px; color: #94a3b8; text-align: center; }
  .book-item.unlocked { background: #fffbeb; border-color: #fcd34d; color: #1e293b; font-weight: bold; }
  .book-emoji { font-size: 26px; filter: grayscale(100%); opacity: 0.3; }
  .book-item.unlocked .book-emoji { filter: grayscale(0%); opacity: 1; }
  
  button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; }
  .btn-cook { background: #3b82f6; color: white; width: 60%; }
  .btn-reset { background: #94a3b8; color: white; width: 35%; }
  .btn-clear-save { background: #ef4444; color: white; font-size: 10px; padding: 4px 8px; margin-top: 10px; }

  .result-card { background: #f0fdf4; border: 2px solid #bbf7d0; border-radius: 15px; padding: 12px; margin-top: 15px; display: none; }
  .result-card.epic { background: #faf5ff; border-color: #e9d5ff; }
  .result-card.fail { background: #fef2f2; border-color: #fee2e2; }
  
  .status { font-size: 12px; color: #ef4444; font-weight: bold; margin-top: 4px; height: 16px; }
</style>
</head>
<body>
  <div class="container">
    <h2>🍳 식당</h2>
    
    <div class="grid-layout">
      <div class="left-col">
        <div class="panel" style="background: #fffbeb;">
          <div class="panel-title">🛒 식재료 시장 <span style="font-size:11px; color:#d97706;">재료 터치 시 구매</span></div>
          <div class="shop-grid" id="shop-grid"></div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <span>❄️ 내 냉장고</span>
            <span id="gold-display" style="color: #d97706; font-size: 16px; font-weight:bold;">🪙 20 G</span>
          </div>
          <div class="ingredients" id="fridge-list"></div>
        </div>

        <div class="panel" style="background: #f8fafc;">
          <div class="panel-title">🔮 냄비 (최대 4개)</div>
          <div class="pot" id="pot">🍲 드래그해서 투하</div>
          <div class="status" id="status"></div>
          <div style="display: flex; justify-content: space-between;">
            <button class="btn-cook" onclick="cookStart()">🔥 요리 시작!</button>
            <button class="btn-reset" onclick="clearPot()">냄비 비우기</button>
          </div>
        </div>
      </div>

      <div class="right-col">
        <div class="panel-title">📖 도감 (<span id="book-count">0</span>/8)</div>
        <div class="book-grid" id="book-grid"></div>
      </div>
    </div>

    <div class="result-card" id="result-card">
      <div id="res-grade" style="font-size:11px; font-weight:bold; color:#16a34a;">[일반 요리]</div>
      <div id="res-emoji" style="font-size: 45px; margin: 5px 0;">🍲</div>
      <div id="res-name" style="font-size: 18px; font-weight: bold; color: #1e293b;">요리 이름</div>
      <div id="res-desc" style="font-size: 12px; color: #64748b; margin-top: 3px;">요리 설명</div>
    </div>

    <button class="btn-clear-save" onclick="clearSaveData()">데이터 초기화</button>
  </div>

  <script>
    const allIngredients = [
      { id: 'rice', name: '쌀밥', emoji: '🍚', price: 1 },
      { id: 'bread', name: '식빵', emoji: '🍞', price: 1 },
      { id: 'egg', name: '달걀', emoji: '🥚', price: 1 },
      { id: 'potato', name: '감자', emoji: '🥔', price: 2 },
      { id: 'mushroom', name: '버섯', emoji: '🍄', price: 2 },
      { id: 'kimchi', name: '김치', emoji: '🥬', price: 2 },
      { id: 'apple', name: '독사과', emoji: '🍎', price: 3 },
      { id: 'cheese', name: '치즈', emoji: '🧀', price: 3 },
      { id: 'fish', name: '생선', emoji: '🐟', price: 4 },
      { id: 'meat', name: '고기', emoji: '🥩', price: 5 }
    ];

    const itemBookData = {
      'meat,rice': { name: '고기 덮밥', emoji: '🍛', desc: '고기와 밥의 완벽한 조화.' },
      'egg,rice': { name: '간장 계란밥', emoji: '🍳', desc: '자취생들의 영원한 친구. 가성비 최고.' },
      'bread,cheese': { name: '치즈 토스트', emoji: '🥪', desc: '치즈가 쭈욱 늘어납니다.' },
      'kimchi,rice': { name: '김치 볶음밥', emoji: '🥘', desc: '계란 프라이를 얹으면 더 좋습니다.' },
      'apple,bread': { name: '독사과 파이', emoji: '🥧', desc: '달콤하지만 왠지 위험해 보입니다.' },
      'fish,potato': { name: '피쉬 앤 칩스', emoji: '🍟', desc: '항구 도시에서 자주 먹는 간식.' },
      'cheese,kimchi,rice': { name: '치즈 김치 볶음밥', emoji: '🧀', desc: '풍미와 매콤함이 어우러진 최고의 맛.' },
      'egg,mushroom,rice': { name: '버섯 계란 덮밥', emoji: '🍄', desc: '건강하고 든든한 산속의 식사.' }
    };

    let gameState = { gold: 20, fridge: ['rice', 'bread', 'egg'], unlockedIds: [] };
    let currentPot = [];
    let currentPotNames = [];

    function saveGame() { localStorage.setItem('cookool_mobile_save', JSON.stringify(gameState)); }
    function loadGame() {
      const saved = localStorage.getItem('cookool_mobile_save');
      if (saved) gameState = JSON.parse(saved);
      renderShop(); renderFridge(); renderBook(); updateGoldDisplay();
    }
    function clearSaveData() { if(confirm("초기화하시겠습니까?")) { localStorage.removeItem('cookool_mobile_save'); location.reload(); } }
    function updateGoldDisplay() { document.getElementById('gold-display').innerText = `🪙 ${gameState.gold} G`; }

    function renderShop() {
      const shopGrid = document.getElementById('shop-grid'); shopGrid.innerHTML = '';
      allIngredients.forEach(item => {
        const div = document.createElement('div'); div.className = 'shop-item';
        div.innerHTML = `<div class="shop-emoji">${item.emoji}</div><div class="shop-price">${item.price}G</div>`;
        div.onclick = () => buySpecificIngredient(item);
        shopGrid.appendChild(div);
      });
    }

    function renderFridge() {
      const fridgeList = document.getElementById('fridge-list'); fridgeList.innerHTML = '';
      gameState.fridge.forEach((ingId, index) => {
        const item = allIngredients.find(i => i.id === ingId);
        if (item) {
          const div = document.createElement('div');
          div.className = 'ingredient';
          div.dataset.id = item.id;
          div.dataset.name = item.name;
          div.dataset.index = index;
          div.innerText = item.emoji;
          
          // PC 마우스 드래그 설정
          div.draggable = true;
          
          // ★ 모바일 터치 드래그 이벤트 주입 ★
          setupTouchEvent(div);
          
          fridgeList.appendChild(div);
        }
      });
    }

    function renderBook() {
      const bookGrid = document.getElementById('book-grid'); bookGrid.innerHTML = '';
      let unlockCount = 0;
      Object.keys(itemBookData).forEach(key => {
        const food = itemBookData[key];
        const isUnlocked = gameState.unlockedIds.includes(food.name);
        const card = document.createElement('div'); card.className = `book-item ${isUnlocked ? 'unlocked' : ''}`;
        if (isUnlocked) { unlockCount++; card.innerHTML = `<div class="book-emoji">${food.emoji}</div><div>${food.name}</div>`; } 
        else { card.innerHTML = `<div class="book-emoji">${food.emoji}</div><div>???</div>`; }
        bookGrid.appendChild(card);
      });
      document.getElementById('book-count').innerText = unlockCount;
    }

    function buySpecificIngredient(item) {
      if (gameState.gold < item.price) { document.getElementById('status').innerText = `⚠️ 골드 부족!`; return; }
      if (gameState.fridge.length >= 25) return;
      gameState.gold -= item.price; gameState.fridge.push(item.id);
      updateGoldDisplay(); renderFridge(); saveGame();
    }

    // --- 🛠️ 핵심: PC 마우스용 기본 드래그 앤 드롭 구현 ---
    document.addEventListener('dragstart', (e) => {
      if (e.target.classList.contains('ingredient')) {
        e.dataTransfer.setData('id', e.target.dataset.id);
        e.dataTransfer.setData('name', e.target.dataset.name);
        e.dataTransfer.setData('index', e.target.dataset.index);
      }
    });
    const potElement = document.getElementById('pot');
    potElement.addEventListener('dragover', (e) => e.preventDefault());
    potElement.addEventListener('drop', (e) => {
      e.preventDefault();
      handleDropAction(e.dataTransfer.getData('id'), e.dataTransfer.getData('name'), parseInt(e.dataTransfer.getData('index')));
    });

    // --- 📱 핵심: 모바일 터치 드래그 연산 로직 ---
    function setupTouchEvent(element) {
      let startX, startY, initialX, initialY;
      
      element.addEventListener('touchstart', function(e) {
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        element.classList.add('dragging');
        // 엘리먼트 고유의 원래 위치 기억
        element.style.position = 'relative';
      }, {passive: true});

      element.addEventListener('touchmove', function(e) {
        if (!element.classList.contains('dragging')) return;
        const touch = e.touches[0];
        
        // 손가락이 움직인 만큼 좌표 실시간 연산 적용
        const movementX = touch.clientX - startX;
        const movementY = touch.clientY - startY;
        
        element.style.transform = `translate(${movementX}px, ${movementY}px)`;
        element.style.zIndex = '1000'; // 드래그 중인 요소를 맨 앞으로 짜기
      }, {passive: false});

      element.addEventListener('touchend', function(e) {
        element.classList.remove('dragging');
        element.style.zIndex = '10';
        
        // 손가락을 뗀 시점의 좌표에 '냄비(Pot)'가 있는지 충돌 체크 연산(AABB)
        const touch = e.changedTouches[0];
        const potRect = potElement.getBoundingClientRect();
        
        element.style.transform = 'none'; // 원래 자리로 그래픽 복구
        
        // 내 손가락 위치가 냄비 범위 안에 안착했는지 검사
        if (touch.clientX >= potRect.left && touch.clientX <= potRect.right &&
            touch.clientY >= potRect.top && touch.clientY <= potRect.bottom) {
          
          // 충돌 성공 시 아이템 투하 함수 실행
          handleDropAction(element.dataset.id, element.dataset.name, parseInt(element.dataset.index));
        }
      });
    }

    // --- 공통 투하 처리 마스터 함수 ---
    function handleDropAction(id, name, index) {
      if (!id) return;
      if (currentPot.length >= 4) { document.getElementById('status').innerText = '⚠️ 냄비가 꽉 찼습니다!'; return; }
      if (currentPot.includes(id)) { document.getElementById('status').innerText = '⚠️ 중복 재료 불가능!'; return; }

      currentPot.push(id);
      currentPotNames.push(name);
      gameState.fridge.splice(index, 1);
      
      renderFridge();
      potElement.innerHTML = currentPot.map(ingId => allIngredients.find(i => i.id === ingId).emoji).join(' ');
      document.getElementById('status').innerText = '';
      saveGame();
    }

    function clearPot() {
      currentPot.forEach(ingId => gameState.fridge.push(ingId));
      currentPot = []; currentPotNames = [];
      potElement.innerHTML = '🍲 드래그해서 투하';
      renderFridge(); saveGame();
    }

    function cookStart() {
      if (currentPot.length < 2) { document.getElementById('status').innerText = '⚠️ 재료는 2개 이상!'; return; }
      potElement.innerText = '🔥 조리 중... 🔥';
      
      setTimeout(() => {
        const recipeKey = currentPot.sort().join(',');
        const bookMatch = itemBookData[recipeKey];
        let finalName, finalEmoji, finalDesc, gradeClass, rewardGold;
        let gradeText = "[일반 요리]";
        const dice = Math.random();

        if (dice < 0.10) {
          finalName = "검은 잿더미"; finalEmoji = "💥"; finalDesc = "요리를 완전히 망쳤습니다."; gradeText = "💀 대실패 💀"; gradeClass = "fail"; rewardGold = 1;
        } else if (dice > 0.88 && bookMatch) {
          finalName = `🌟 특제 ${bookMatch.name}`; finalEmoji = "👑"; finalDesc = `완벽한 타이밍에 최고의 요리가 완성되었습니다!`; gradeText = "✨ 대성공 (LEGEND) ✨"; gradeClass = "epic"; rewardGold = 30;
          if (!gameState.unlockedIds.includes(bookMatch.name)) gameState.unlockedIds.push(bookMatch.name);
        } else {
          gradeClass = "";
          if (bookMatch) {
            finalName = bookMatch.name; finalEmoji = bookMatch.emoji; finalDesc = bookMatch.desc; rewardGold = 10;
            if (!gameState.unlockedIds.includes(finalName)) gameState.unlockedIds.push(finalName);
          } else {
            finalName = "독특한 잡탕"; finalEmoji = "🍲"; finalDesc = "알 수 없는 조합의 오묘한 맛입니다."; rewardGold = 4;
          }
        }

        const resCard = document.getElementById('result-card');
        resCard.className = `result-card ${gradeClass}`;
        document.getElementById('res-grade').innerText = `${gradeText} (+${rewardGold}G 수입!)`;
        document.getElementById('res-emoji').innerText = finalEmoji; document.getElementById('res-name').innerText = finalName; document.getElementById('res-desc').innerText = finalDesc;
        resCard.style.display = 'block';

        gameState.gold += rewardGold; currentPot = []; currentPotNames = [];
        potElement.innerHTML = '🍲 드래그해서 투하';
        updateGoldDisplay(); renderBook(); saveGame();
      }, 600);
    }

    window.onload = loadGame;
  </script>
</body>
</html>
