<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연금술 식당</title>
<style>
  body { font-family: 'Pretendard', sans-serif; text-align: center; background-color: #f4f6fa; margin: 0; padding: 20px; }
  .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
  
  /* 레이아웃 */
  .grid-layout { display: flex; gap: 20px; margin-bottom: 30px; }
  .left-col { flex: 1.3; display: flex; flex-direction: column; gap: 20px; }
  .right-col { flex: 0.7; background: #fff; border: 2px solid #e2e8f0; border-radius: 15px; padding: 15px; }
  
  .panel { background: #f8fafc; border-radius: 15px; padding: 15px; border: 1px solid #e2e8f0; }
  .panel-title { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #334155; display: flex; justify-content: space-between; align-items: center; }
  
  /* 지정 구매 상점 그리드 */
  .shop-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .shop-item { background: white; border: 1px solid #fcd34d; border-radius: 8px; padding: 8px 5px; cursor: pointer; transition: all 0.15s; user-select: none; }
  .shop-item:hover { background: #fef3c7; transform: translateY(-2px); }
  .shop-item:active { transform: scale(0.95); }
  .shop-emoji { font-size: 24px; margin-bottom: 2px; }
  .shop-price { font-size: 12px; color: #d97706; font-weight: bold; }
  
  /* 냉장고 재료 스타일 */
  .ingredients { display: flex; flex-wrap: wrap; gap: 8px; min-height: 60px; background: white; padding: 10px; border-radius: 10px; border: 1px inset #f1f5f9; }
  .ingredient { font-size: 30px; cursor: grab; padding: 5px; background: #fff; border: 2px solid #e2e8f0; border-radius: 8px; user-select: none; }
  .ingredient:active { transform: scale(0.95); }
  
  /* 항아리 */
  .pot { width: 100%; height: 110px; border: 3px dashed #cbd5e1; border-radius: 15px; display: flex; align-items: center; justify-content: center; background: white; font-size: 26px; gap: 5px; }
  .pot.dragover { background: #eff6ff; border-color: #3b82f6; }
  
  /* 도감 스타일 */
  .book-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 450px; overflow-y: auto; padding-right: 5px; }
  .book-item { background: #f1f5f9; border-radius: 10px; padding: 10px; font-size: 12px; color: #94a3b8; border: 2px solid transparent; text-align: center; }
  .book-item.unlocked { background: #fffbeb; border-color: #fcd34d; color: #1e293b; font-weight: bold; animation: pop 0.3s ease; }
  .book-emoji { font-size: 30px; filter: grayscale(100%); opacity: 0.3; margin-bottom: 5px; }
  .book-item.unlocked .book-emoji { filter: grayscale(0%); opacity: 1; }
  
  /* 버튼들 */
  button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: background 0.2s; }
  .btn-cook { background: #3b82f6; color: white; font-size: 15px; padding: 10px 20px; margin-top: 10px; width: 60%; }
  .btn-reset { background: #94a3b8; color: white; width: 35%; }
  .btn-clear-save { background: #ef4444; color: white; font-size: 11px; padding: 6px 10px; margin-top: 15px; }

  /* 결과 팝업 */
  .result-card { background: #f0fdf4; border: 2px solid #bbf7d0; border-radius: 15px; padding: 15px; margin-top: 20px; display: none; }
  .result-card.epic { background: #faf5ff; border-color: #e9d5ff; }
  .result-card.fail { background: #fef2f2; border-color: #fee2e2; }
  
  .status { font-size: 13px; color: #ef4444; font-weight: bold; margin-top: 5px; height: 18px; }
  @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
</style>
</head>
<body>
  <div class="container">
    <h2>🍳 소박한 연금술 식당</h2>
    
    <div class="grid-layout">
      <div class="left-col">
        
        <div class="panel" style="background: #fffbeb;">
          <div class="panel-title">
            <span>🛒 식재료 시장</span>
            <span style="font-size: 12px; color: #d97706;">원하는 재료를 클릭해 구매하세요!</span>
          </div>
          <div class="shop-grid" id="shop-grid">
            </div>
        </div>

        <div class="panel">
          <div class="panel-title">
            <span>❄️ 내 냉장고</span>
            <span id="gold-display" style="color: #d97706; font-size: 18px;">🪙 20 골드</span>
          </div>
          <div class="ingredients" id="fridge-list"></div>
        </div>

        <div class="panel" style="background: #f8fafc;">
          <div class="panel-title">🔮 연금술 냄비 (최대 4개)</div>
          <div class="pot" id="pot">🍲 드래그 앤 드롭</div>
          <div class="status" id="status"></div>
          <div style="display: flex; justify-content: space-between; gap: 10px;">
            <button class="btn-cook" onclick="cookStart()">🔥 요리 시작!</button>
            <button class="btn-reset" onclick="clearPot()">냄비 비우기</button>
          </div>
        </div>
      </div>

      <div class="right-col">
        <div class="panel-title">📖 발견한 도감 (<span id="book-count">0</span>/8)</div>
        <div class="book-grid" id="book-grid"></div>
      </div>
    </div>

    <div class="result-card" id="result-card">
      <div id="res-grade" style="font-size:12px; font-weight:bold; color:#16a34a;">[일반 요리]</div>
      <div id="res-emoji" style="font-size: 55px; margin: 5px 0;">🍲</div>
      <div id="res-name" style="font-size: 20px; font-weight: bold; color: #1e293b;">요리 이름</div>
      <div id="res-desc" style="font-size: 13px; color: #64748b; margin-top: 5px;">요리 설명</div>
    </div>

    <button class="btn-clear-save" onclick="clearSaveData()">데이터 초기화 (물가 갱신 시 필수 클릭!)</button>
  </div>

  <script>
    // --- 1. 재료 10종 & 1원~5원 물가 설정 ---
    const allIngredients = [
      { id: 'rice', name: '쌀밥', emoji: '🍚', price: 1 },
      { id: 'bread', name: '식빵', emoji: '🍞', price: 1 },
      { id: 'egg', name: '달걀', emoji: '🥚', price: 1 },
      { id: 'potato', name: '감자', emoji: '🥔', price: 2 },
      { id: 'mushroom', name: '버섯', emoji: '🍄', price: 2 },
      { id: 'kimchi', name: '김치', emoji: '🥬', price: 2 },
      { id: 'apple', name: '독사과', emoji: '🍎', price: 3 },
      { id: 'cheese', name: '치즈', emoji: '🧀', price: 3 },
      { id: 'fish', name: '생선', emoji: '🐟', price: 4 },
      { id: 'meat', name: '고기', emoji: '🥩', price: 5 }
    ];

    // --- 2. 확장된 요리 도감 ---
    const itemBookData = {
      'meat,rice': { name: '고기 덮밥', emoji: '🍛', desc: '고기와 밥의 완벽한 조화. (5G+1G 재료)' },
      'egg,rice': { name: '간장 계란밥', emoji: '🍳', desc: '자취생들의 영원한 친구. 가성비 최고.' },
      'bread,cheese': { name: '치즈 토스트', emoji: '🥪', desc: '치즈가 쭈욱 늘어납니다.' },
      'kimchi,rice': { name: '김치 볶음밥', emoji: '🥘', desc: '계란 프라이를 얹으면 더 좋습니다.' },
      'apple,bread': { name: '독사과 파이', emoji: '🥧', desc: '달콤하지만 왠지 위험해 보입니다.' },
      'fish,potato': { name: '피쉬 앤 칩스', emoji: '🍟', desc: '항구 도시에서 자주 먹는 간식.' },
      'cheese,kimchi,rice': { name: '치즈 김치 볶음밥', emoji: '🧀', desc: '풍미와 매콤함이 어우러진 최고의 맛.' },
      'egg,mushroom,rice': { name: '버섯 계란 덮밥', emoji: '🍄', desc: '건강하고 든든한 산속의 식사.' }
    };

    // --- 3. 게임 상태 (물가 패치 반영) ---
    let gameState = {
      gold: 20, // 기본 자본금 하향 조정
      fridge: ['rice', 'bread', 'egg'], // 기본 지급 재료
      unlockedIds: []
    };

    let currentPot = [];
    let currentPotNames = [];

    // --- 4. 세이브 & 로드 ---
    function saveGame() {
      localStorage.setItem('cookool_cheap_save', JSON.stringify(gameState));
    }

    function loadGame() {
      const saved = localStorage.getItem('cookool_cheap_save');
      if (saved) {
        gameState = JSON.parse(saved);
      }
      renderShop();
      renderFridge();
      renderBook();
      updateGoldDisplay();
    }

    function clearSaveData() {
      if(confirm("모든 데이터를 지우고 처음부터 시작합니다. (새로운 물가 시스템 적용을 위해 권장됩니다)")) {
        localStorage.removeItem('cookool_cheap_save');
        location.reload();
      }
    }

    // --- 5. UI 렌더링 ---
    function updateGoldDisplay() {
      document.getElementById('gold-display').innerText = `🪙 ${gameState.gold} G`;
    }

    function renderShop() {
      const shopGrid = document.getElementById('shop-grid');
      shopGrid.innerHTML = '';
      allIngredients.forEach(item => {
        const div = document.createElement('div');
        div.className = 'shop-item';
        div.innerHTML = `
          <div class="shop-emoji">${item.emoji}</div>
          <div style="font-size: 11px; color:#333;">${item.name}</div>
          <div class="shop-price">${item.price}G</div>
        `;
        // 클릭 시 해당 재료 구매
        div.onclick = () => buySpecificIngredient(item);
        shopGrid.appendChild(div);
      });
    }

    function renderFridge() {
      const fridgeList = document.getElementById('fridge-list');
      fridgeList.innerHTML = '';
      gameState.fridge.forEach((ingId, index) => {
        const item = allIngredients.find(i => i.id === ingId);
        if (item) {
          const div = document.createElement('div');
          div.className = 'ingredient';
          div.draggable = true;
          div.dataset.id = item.id;
          div.dataset.name = item.name;
          div.dataset.index = index;
          div.innerText = item.emoji;
          fridgeList.appendChild(div);
        }
      });
    }

    function renderBook() {
      const bookGrid = document.getElementById('book-grid');
      bookGrid.innerHTML = '';
      let unlockCount = 0;

      Object.keys(itemBookData).forEach(key => {
        const food = itemBookData[key];
        const isUnlocked = gameState.unlockedIds.includes(food.name);
        
        const card = document.createElement('div');
        card.className = `book-item ${isUnlocked ? 'unlocked' : ''}`;
        
        if (isUnlocked) {
          unlockCount++;
          card.innerHTML = `
            <div class="book-emoji" style="font-size:24px;">${food.emoji}</div>
            <div style="font-size:11px;">${food.name}</div>
          `;
          card.title = food.desc;
        } else {
          card.innerHTML = `
            <div class="book-emoji" style="font-size:24px;">${food.emoji}</div>
            <div style="font-size:11px;">???</div>
          `;
        }
        bookGrid.appendChild(card);
      });
      document.getElementById('book-count').innerText = unlockCount;
    }

    // --- 6. 지정 구매 로직 ---
    function buySpecificIngredient(item) {
      if (gameState.gold < item.price) {
        document.getElementById('status').innerText = `⚠️ 골드가 부족합니다! (${item.price}G 필요)`;
        return;
      }
      if (gameState.fridge.length >= 25) {
        document.getElementById('status').innerText = `⚠️ 냉장고가 너무 꽉 찼습니다! 요리를 먼저 하세요.`;
        return;
      }
      
      gameState.gold -= item.price;
      gameState.fridge.push(item.id);
      
      document.getElementById('status').innerText = `🛒 [${item.name}] 구매 완료!`;
      updateGoldDisplay();
      renderFridge();
      saveGame();
    }

    // --- 7. 드래그 앤 드롭 ---
    document.addEventListener('dragstart', (e) => {
      if (e.target.classList.contains('ingredient')) {
        e.dataTransfer.setData('id', e.target.dataset.id);
        e.dataTransfer.setData('name', e.target.dataset.name);
        e.dataTransfer.setData('index', e.target.dataset.index);
      }
    });

    const potElement = document.getElementById('pot');
    potElement.addEventListener('dragover', (e) => { e.preventDefault(); potElement.classList.add('dragover'); });
    potElement.addEventListener('dragleave', () => potElement.classList.remove('dragover'));

    potElement.addEventListener('drop', (e) => {
      e.preventDefault();
      potElement.classList.remove('dragover');
      if (currentPot.length >= 4) {
        document.getElementById('status').innerText = '⚠️ 냄비가 가득 찼습니다!';
        return;
      }

      const id = e.dataTransfer.getData('id');
      const name = e.dataTransfer.getData('name');
      const index = parseInt(e.dataTransfer.getData('index'));

      if (id) {
        if (currentPot.includes(id)) {
          document.getElementById('status').innerText = '⚠️ 중복 재료는 넣을 수 없습니다!';
          return;
        }
        currentPot.push(id);
        currentPotNames.push(name);
        
        gameState.fridge.splice(index, 1);
        renderFridge();
        
        potElement.innerHTML = currentPot.map(ingId => {
          return allIngredients.find(i => i.id === ingId).emoji;
        }).join(' ');
        
        document.getElementById('status').innerText = '';
        saveGame();
      }
    });

    function clearPot() {
      currentPot.forEach(ingId => gameState.fridge.push(ingId));
      currentPot = [];
      currentPotNames = [];
      potElement.innerHTML = '🍲 드래그 앤 드롭';
      renderFridge();
      saveGame();
    }

    // --- 8. 요리 & 보상 로직 (소액 물가 패치) ---
    function cookStart() {
      if (currentPot.length < 2) {
        document.getElementById('status').innerText = '⚠️ 재료를 2개 이상 넣어주세요!';
        return;
      }

      potElement.innerText = '🔥 조리 중... 🔥';
      document.getElementById('status').innerText = '';

      setTimeout(() => {
        const recipeKey = currentPot.sort().join(',');
        const bookMatch = itemBookData[recipeKey];

        let finalName, finalEmoji, finalDesc, gradeClass, rewardGold;
        let gradeText = "[일반 요리]";
        const dice = Math.random(); 

        if (dice < 0.10) { 
          // 10% 대실패 (위로금 1G)
          finalName = "검은 잿더미";
          finalEmoji = "💥";
          finalDesc = "요리를 완전히 망쳤습니다.";
          gradeText = "💀 대실패 💀";
          gradeClass = "fail";
          rewardGold = 1; 
        } 
        else if (dice > 0.88 && bookMatch) { 
          // 12% 대성공 (대박 30G)
          finalName = `🌟 특제 ${bookMatch.name}`;
          finalEmoji = "👑";
          finalDesc = `완벽한 타이밍에 요리가 완성되었습니다! 손님들이 줄을 섭니다.`;
          gradeText = "✨ 대성공 (LEGEND) ✨";
          gradeClass = "epic";
          rewardGold = 30; 

          if (!gameState.unlockedIds.includes(bookMatch.name)) gameState.unlockedIds.push(bookMatch.name);
        } 
        else {
          gradeClass = "";
          if (bookMatch) {
            // 도감 요리 성공 (10G)
            finalName = bookMatch.name;
            finalEmoji = bookMatch.emoji;
            finalDesc = bookMatch.desc;
            rewardGold = 10; 

            if (!gameState.unlockedIds.includes(finalName)) gameState.unlockedIds.push(finalName);
          } else {
            // 잡탕 (4G)
            const adjectives = ['미묘한', '독특한', '따뜻한'];
            finalName = `${adjectives[Math.floor(Math.random() * adjectives.length)]} 잡탕`;
            finalEmoji = "🍲";
            finalDesc = `${currentPotNames.join(', ')}의 알 수 없는 조합.`;
            rewardGold = 4; 
          }
        }

        const resCard = document.getElementById('result-card');
        resCard.className = `result-card ${gradeClass}`;
        document.getElementById('res-grade').innerText = `${gradeText} (+${rewardGold}G 수입!)`;
        document.getElementById('res-emoji').innerText = finalEmoji;
        document.getElementById('res-name').innerText = finalName;
        document.getElementById('res-desc').innerText = finalDesc;
        resCard.style.display = 'block';

        gameState.gold += rewardGold;
        currentPot = [];
        currentPotNames = [];
        potElement.innerHTML = '🍲 드래그 앤 드롭';
        
        updateGoldDisplay();
        renderBook();
        saveGame();
      }, 700);
    }

    window.onload = loadGame;
  </script>
</body>
</html>
